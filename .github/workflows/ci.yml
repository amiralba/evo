name: CI

on:
  push:
    branches: [main]
  pull_request:

# The integration tests and the e2e suite talk to a real SQL Server on localhost:1433 with the
# same dev-only credentials the local docker-compose uses (hardcoded in the test fixtures —
# audit §E.5 tracks consolidating that).

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Local_dev_only!1"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Local_dev_only!1' -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 20s
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet build backend/Evo.sln
      - run: dotnet test backend/Evo.sln

  panel:
    runs-on: ubuntu-latest
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Local_dev_only!1"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Local_dev_only!1' -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 20s
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: panel/package-lock.json
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Install panel dependencies
        run: npm ci
        working-directory: panel
      - name: Lint
        run: npm run lint
        working-directory: panel
      - name: Generate API client
        run: npm run generate-api-client
        working-directory: panel
      - name: Unit tests
        run: npm test
        working-directory: panel
      - name: Build
        run: npm run build
        working-directory: panel
      # The e2e suite drives the REAL backend (see panel/e2e/README.md): seed, launch the API in
      # the background, wait for it, then run Playwright (it starts the vite dev server itself).
      - name: Seed database
        run: dotnet run --project backend/src/Evo.Seeder -- --profile demo
      - name: Start backend API
        run: |
          dotnet run --project backend/src/Evo.Api &
          for i in $(seq 1 60); do
            curl -sf http://localhost:5076/api/v1/health > /dev/null && exit 0
            sleep 2
          done
          echo "::error::backend API did not become ready on :5076" && exit 1
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: panel
      - name: E2E tests
        run: npx playwright test
        working-directory: panel
      - name: Upload e2e failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: panel/test-results/
          if-no-files-found: ignore

  contract-drift:
    # panel/src/api/generated/ is gitignored and always freshly regenerated (see panel job),
    # so the only committed artifact that can drift is contracts/openapi.json itself.
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Regenerate contracts/openapi.json
        run: dotnet build backend/Evo.sln
      - name: Fail if the committed OpenAPI contract is out of date
        run: |
          git diff --exit-code -- contracts/openapi.json \
            || (echo "::error::contracts/openapi.json is out of date — run 'dotnet build backend/Evo.sln' and commit the result." && exit 1)
