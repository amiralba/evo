<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Defense-in-depth vs stored XSS (audit §C H1/H2). script-src needs 'unsafe-inline' while the
         hosted prototype relies on inline onclick= handlers — removing that is part of decision D2b
         (engine.js -> TS). openfreemap + ws: cover MapLibre tiles/style and vite HMR. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://tiles.openfreemap.org; connect-src 'self' ws: https://tiles.openfreemap.org; worker-src 'self' blob:; font-src 'self' data:; object-src 'none'; base-uri 'self'"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>panel</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
